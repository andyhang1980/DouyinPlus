name: Build and Release
on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        run: |
          echo ANDROID_HOME=${ANDROID_HOME} >> $GITHUB_ENV
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
      - name: Make gradlew executable
        run: chmod +x gradlew && ls -la gradlew
      - name: Which gradle
        run: which gradle && gradle --version 2>/dev/null || echo "no global gradle"
      - name: Try build debug first
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -n 100
      - name: Build release
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -n 150
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: APK
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: APK
          path: apk
      - name: Get SHA
        id: slug
        run: echo sha=$(echo $GITHUB_SHA | cut -c1-7) >> $GITHUB_OUTPUT
      - name: Release
        run: |
          ls -la apk/
          APK=$(ls apk/*release*.apk 2>/dev/null | head -n1)
          if [ -z "$APK" ]; then APK=$(ls apk/*.apk | head -n1); fi
          mv "$APK" apk/DY.apk
          ls -la apk/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.slug.outputs.sha }}
          name: DY v3.2.0
          files: apk/DY.apk