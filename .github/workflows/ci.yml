name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> $GITHUB_ENV
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
      - name: Download Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore debug.jks -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Debug"

      - name: Build
        run: |
          export ANDROID_HOME=${ANDROID_HOME}
          export ANDROID_SDK_ROOT=${ANDROID_HOME}
          gradle assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=debug.jks \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=debug \
            -Pandroid.injected.signing.key.password=android

      - uses: actions/upload-artifact@v4
        with:
          name: DouyinPlus-APK
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: DouyinPlus-APK
          path: apk

      - name: Get short SHA
        id: slug
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ steps.slug.outputs.sha }}"
          name: "Build ${{ steps.slug.outputs.sha }} (鎶栭煶灏忚兘鎵?"
          files: apk/*.apk
          prerelease: true
          body: |
            ## 鎶栭煶灏忚兘鎵?- 鑷姩鏋勫缓 v1.1
            
            - Commit: ${{ github.sha }}
            - 鍔熻兘: 鍘诲箍鍛?路 鏃犳按鍗颁笅杞?路 闊抽涓嬭浇 路 澶嶅埗閾炬帴 路 鑷€傚簲閫傞厤
            
            ### 瀹夎
            1. 纭繚宸插畨瑁?LSPosed 妗嗘灦
            2. 瀹夎姝?APK
            3. 鍦?LSPosed 涓惎鐢ㄦā鍧楀苟鍕鹃€夋姈闊?            4. 閲嶅惎鎶栭煶
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
