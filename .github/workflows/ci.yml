name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          mkdir -p ${{ runner.temp }}/android-sdk/cmdline-tools
          cd ${{ runner.temp }}/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p latest
          mv cmdline-tools/* latest/ 2>/dev/null || true
          export ANDROID_SDK_ROOT=${{ runner.temp }}/android-sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: Download Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore debug.jks -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Debug"

      - name: Build
        run: |
          export ANDROID_SDK_ROOT=${{ runner.temp }}/android-sdk
          gradle assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=debug.jks \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=debug \
            -Pandroid.injected.signing.key.password=android

      - uses: actions/upload-artifact@v4
        with:
          name: DouyinPlus-APK
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: DouyinPlus-APK
          path: apk

      - name: Get short SHA
        id: slug
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ steps.slug.outputs.sha }}"
          name: "Build ${{ steps.slug.outputs.sha }} (抖音小能手)"
          files: apk/*.apk
          prerelease: true
          body: |
            ## 抖音小能手 - 自动构建 v1.1

            - Commit: ${{ github.sha }}
            - 功能: 去广告 · 无水印下载 · 音频下载 · 复制链接 · 自适应适配

            ### 安装
            1. 确保已安装 LSPosed 框架
            2. 安装此 APK
            3. 在 LSPosed 中启用模块并勾选抖音
            4. 重启抖音
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
