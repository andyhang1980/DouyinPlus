name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> $GITHUB_ENV
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Download Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore ${{ github.workspace }}/app/debug.jks -alias debug             -keyalg RSA -keysize 2048 -validity 10000             -storepass android -keypass android -dname "CN=Debug"

      - name: Build
        run: |
          export ANDROID_HOME=${ANDROID_HOME}
          export ANDROID_SDK_ROOT=${ANDROID_HOME}
          gradle assembleRelease --no-daemon             -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/debug.jks             -Pandroid.injected.signing.store.password=android             -Pandroid.injected.signing.key.alias=debug             -Pandroid.injected.signing.key.password=android

      - uses: actions/upload-artifact@v4
        with:
          name: DouyinPlus-APK
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: DouyinPlus-APK
          path: apk

      - name: Get short SHA
        id: slug
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv apk/app-release.apk "apk/抖音小能手-v3.1.0.apk"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ steps.slug.outputs.sha }}"
          name: "抖音小能手 v3.1.0"
          files: apk/*.apk
          prerelease: true
          body: |
            ## 抖音小能手 v3.1.0

            适配抖音 39.5 版本

            ### 功能
            - 复制链接
            - 视频/图片下载（无水印）
            - 音频下载
            - 去广告（自动适配）
            - 跳过开屏广告

            ### 安装方法
            1. 安装 LSPosed 框架
            2. 安装本 APK
            3. 在 LSPosed 中启用模块并勾选抖音
            4. 重启抖音

            ### 注意事项
            打开抖音后会显示 Toast 提示适配状态。若某模块未适配成功，请反馈。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
