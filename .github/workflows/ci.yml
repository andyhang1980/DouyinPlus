name: Build and Release
on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        run: |
          echo ANDROID_HOME=${ANDROID_HOME} >> $GITHUB_ENV
          echo ANDROID_SDK_ROOT=${ANDROID_HOME} >> $GITHUB_ENV
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
      - name: Download Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo $PWD/gradle-8.7/bin >> $GITHUB_PATH
      - name: Generate keystore
        run: keytool -genkey -v -keystore ${{ github.workspace }}/app/debug.jks -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname CN=Debug
      - name: Build
        run: |
          gradle assembleRelease --no-daemon -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/debug.jks -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=debug -Pandroid.injected.signing.key.password=android
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: app/build/outputs/apk/release/*.apk
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: APK
          path: apk
      - name: Get SHA
        id: slug
        run: echo sha=$(echo $GITHUB_SHA | cut -c1-7) >> $GITHUB_OUTPUT
      - name: Rename
        run: mv apk/app-release.apk apk/DYpp-v3.1.5.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.slug.outputs.sha }}
          name: DY++ v3.1.5
          files: apk/DYpp-v3.1.5.apk
