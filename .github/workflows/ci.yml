name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> $GITHUB_ENV
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
      - name: Download Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore app/debug.jks -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Debug"

      - name: Build
        run: |
          export ANDROID_HOME=${ANDROID_HOME}
          export ANDROID_SDK_ROOT=${ANDROID_HOME}
          gradle assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=app/debug.jks \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=debug \
            -Pandroid.injected.signing.key.password=android

      - uses: actions/upload-artifact@v4
        with:
          name: DouyinPlus-APK
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: DouyinPlus-APK
          path: apk

      - name: Get short SHA
        id: slug
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ steps.slug.outputs.sha }}"
          name: "Build ${{ steps.slug.outputs.sha }} (閹舵牠鐓剁亸蹇氬厴閹?"
          files: apk/*.apk
          prerelease: true
          body: |
            ## 閹舵牠鐓剁亸蹇氬厴閹?- 閼奉亜濮╅弸鍕紦 v1.1
            
            - Commit: ${{ github.sha }}
            - 閸旂喕鍏? 閸樿绠嶉崨?璺?閺冪姵鎸夐崡棰佺瑓鏉?璺?闂婃娊顣舵稉瀣祰 璺?婢跺秴鍩楅柧鐐复 璺?閼奉亪鈧倸绨查柅鍌炲帳
            
            ### 鐎瑰顥?            1. 绾喕绻氬鎻掔暔鐟?LSPosed 濡楀棙鐏?            2. 鐎瑰顥婂?APK
            3. 閸?LSPosed 娑擃厼鎯庨悽銊δ侀崸妤€鑻熼崟楣冣偓澶嬪闂?            4. 闁插秴鎯庨幎鏍叾
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
