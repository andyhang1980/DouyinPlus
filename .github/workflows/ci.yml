name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.jks \
            -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Dev, O=DouyinPlus, L=, ST=, C=CN"

      - name: Build APK
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=debug.jks \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=debug \
            -Pandroid.injected.signing.key.password=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DouyinPlus-APK
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: DouyinPlus-APK
          path: apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: CI
          name: CI Build
          body: "Auto-built from latest main. Install via LSPosed."
          files: apk/*.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
